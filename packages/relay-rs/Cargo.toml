[package]
name = "paseo-relay"
version = "0.1.0"
edition = "2021"

[dependencies]
# Async runtime
tokio = { version = "1.44", features = ["full"] }

# Web framework + WebSocket
axum = { version = "0.8", features = ["ws"] }
tower = { version = "0.5", features = ["full"] }

# Concurrent state
dashmap = "6.1"

# Cryptography: Curve25519 + XSalsa20-Poly1305 (tweetnacl-compatible)
crypto_box = "0.9"
crypto_secretbox = "0.1"
aead = "0.5"
rand = "0.8"
curve25519-dalek = "4"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Encoding
base64 = "0.22"

# Logging / Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Stream / Future utilities
futures = "0.3"

[dev-dependencies]
tokio-test = "0.4"
